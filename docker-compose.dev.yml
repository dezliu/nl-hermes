# 本地开发专用：仅基础设施，配合 make dev / pnpm dev 热重载
# 用法：make infra  或  docker compose -f docker-compose.dev.yml up -d
# 国内镜像：make infra-cn  或  --env-file docker/mirrors.cn.env

services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    pull_policy: if_not_present
    environment:
      MYSQL_ROOT_PASSWORD: hermes_root
      MYSQL_DATABASE: hermes
      MYSQL_USER: hermes
      MYSQL_PASSWORD: hermes_dev
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uhermes", "-phermes_dev"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    pull_policy: if_not_present
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:v1.12.5}
    pull_policy: if_not_present
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  opensearch:
    image: ${OPENSEARCH_IMAGE:-opensearchproject/opensearch:2.18.0}
    pull_policy: if_not_present
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
  redis_data:
  qdrant_data:
  opensearch_data:
