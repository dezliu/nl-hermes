services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-hermes_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hermes}
      MYSQL_USER: ${MYSQL_USER:-hermes}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hermes_dev}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  opensearch:
    image: opensearchproject/opensearch:2.18.0
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data

  gateway-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: gateway-api
        PORT: 4000
    ports:
      - "4000:4000"
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  metadata-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: metadata-service
        PORT: 4050
    ports:
      - "4050:4050"
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy

  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: orchestrator
        PORT: 4010
    ports:
      - "4010:4010"
    env_file: .env
    depends_on:
      - redis
      - rag-service
      - report-service

  rag-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: rag-service
        PORT: 4020
    ports:
      - "4020:4020"
    env_file: .env
    depends_on:
      - qdrant
      - opensearch

  report-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: report-service
        PORT: 4030
    ports:
      - "4030:4030"
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy

  eval-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE: eval-service
        PORT: 4040
    ports:
      - "4040:4040"
    env_file: .env
    depends_on:
      - orchestrator

  web-user:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        APP: web-user
        PORT: 3001
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_GRAPHQL_URL: http://localhost/graphql

  web-admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        APP: web-admin
        PORT: 3002
    ports:
      - "3002:3002"

  web-monitor:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        APP: web-monitor
        PORT: 3003
    ports:
      - "3003:3003"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gateway-api
      - web-user
      - web-admin
      - web-monitor

volumes:
  mysql_data:
  redis_data:
  qdrant_data:
  opensearch_data:
