upstream gateway {
    server gateway-api:4000;
}
upstream web_user {
    server web-user:3001;
}
upstream web_admin {
    server web-admin:3002;
}
upstream web_monitor {
    server web-monitor:3003;
}

server {
    listen 80;
    client_max_body_size 20m;

    location /graphql {
        proxy_pass http://gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /admin {
        proxy_pass http://web_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /monitor {
        proxy_pass http://web_monitor;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://web_user;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
